name: CI

on: 

    pull_request:
        branches:
            - main
    
    push:
        branches:
            - main

permissions:
  contents: read
  
jobs:
    build-and-test:
        name: Build the project
        runs-on: ubuntu-latest
        # if: github.event_name == 'pull_request'
        steps:
            - uses: actions/checkout@v4

            - name: Install dependencies
              run: npm ci 

            - name: Run eslint
              run: npm run lint:check1

            - name: Test coverage
